<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Héctor Patricio Los Juegos</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    body {
      margin: 0; background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc);
      background-size: 600% 600%; animation: fondo 15s ease infinite;
      color: white; text-align: center; font-family: sans-serif;
    }
    @keyframes fondo { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
    .menu { display: flex; justify-content: center; gap: 15px; margin: 20px; }
    .juego-btn { background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 10px; padding: 10px 20px; color: white; cursor: pointer; font-weight: bold; }
    #area-juego { display: flex; justify-content: center; margin-top: 20px; }
    .arcade-frame { display: flex; background: #1a1a2e; padding: 20px; border-radius: 20px; border: 5px solid #333; }
    .sidebar { width: 80px; background: #0f3460; border-radius: 10px; margin-right: 15px; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
    .bot { width: 40px; height: 40px; border-radius: 5px; background: #e94560; }
    .game-screen { background: #000; width: 950px; height: 720px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <h1>🎮 Héctor Patricio Los Juegos</h1>
  <div class="menu">
    <button class="juego-btn" onclick="lanzar('minejamin')">⛏️ Minejamin</button>
    <button class="juego-btn" onclick="lanzar('papa')">👨 Papá del Seba</button>
    <button class="juego-btn" onclick="lanzar('pvz')">🧟 Plants vs Zombies</button>
  </div>
  <div id="area-juego"></div>

  <script>
    function lanzar(id) {
      const area = document.getElementById("area-juego");
      area.innerHTML = `
        <div class="arcade-frame">
          <div class="sidebar">
            <div class="bot"></div>
            <div class="bot" style="background:#4ecca3"></div>
            <div class="bot" style="background:#fca311"></div>
          </div>
          <div class="game-screen" id="display"></div>
        </div>`;
      
      const display = document.getElementById("display");
      if (id === "pvz") {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        display.appendChild(player);
        player.style.width = "100%";
        player.style.height = "100%";
        
        // USAMOS EL ARCHIVO DE 6MB
        player.load("resources.swf").catch(e => {
          console.error(e);
          // Respaldo por si el archivo en GitHub falla
          player.load("https://archive.org/download/pvz_web/pvz_web.swf");
        });
      } else {
        display.innerHTML = `<h2>Cargando ${id}...</h2>`;
      }
    }
  </script>
</body>
</html>
