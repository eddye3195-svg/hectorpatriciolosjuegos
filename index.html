<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Héctor Patricio Los Juegos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc);
      background-size: 600% 600%;
      animation: fondo 10s ease infinite;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    @keyframes fondo {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 20px;
      font-size: 40px;
      text-shadow: 0 0 15px black;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, 200px);
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .juego {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .juego:hover {
      transform: scale(1.1) rotate(2deg);
      background: rgba(255,255,255,0.4);
    }

    #pantalla {
      margin-top: 40px;
      padding: 20px;
      min-height: 200px;
      animation: aparecer 0.5s;
    }

    @keyframes aparecer {
      from {opacity: 0; transform: scale(0.8);}
      to {opacity: 1; transform: scale(1);}
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #00ffcc;
      color: black;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      background: #00ffaa;
    }

    .caja {
      margin-top: 20px;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
    }

    /* PARTICULAS */
    .particula {
      position: fixed;
      background-size: cover;
      pointer-events: none;
      opacity: 0.7;
      animation: flotar linear infinite;
    }

    @keyframes flotar {
      from {
        transform: translateY(100vh) rotate(0deg);
      }
      to {
        transform: translateY(-10vh) rotate(360deg);
      }
    }

    /* CONTROL DE MUSICA */
    .controles-musica {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }

  </style>
</head>

<body>

  <h1>🎮 Héctor Patricio Los Juegos</h1>

  <audio id="musicaFondo" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <div class="menu">
    <div class="juego" onclick="abrirJuego('minejamin')">
      ⛏️ Minejamin
    </div>

    <div class="juego" onclick="abrirJuego('papa')">
      👨 Papá del Seba
    </div>
  </div>

  <div id="pantalla">
    <p>Selecciona un juego 👆</p>
  </div>

  <div class="controles-musica">
    <button onclick="toggleMusica()" id="btnMusica">🎵 Play Música</button>
  </div>

  <script>
    let puntos = 0;
    const musica = document.getElementById("musicaFondo");
    const btnMusica = document.getElementById("btnMusica");
    let sonando = false;

    // Función para Play/Pausa
    function toggleMusica() {
      if (sonando) {
        musica.pause();
        btnMusica.innerText = "🎵 Play Música";
      } else {
        musica.play();
        btnMusica.innerText = "⏸️ Pausar";
      }
      sonando = !sonando;
    }

    function abrirJuego(juego) {
      // Iniciar música automáticamente al abrir un juego si no está sonando
      if (!sonando) {
        toggleMusica();
      }

      const pantalla = document.getElementById("pantalla");

      if (juego === "minejamin") {
        puntos = 0;
        pantalla.innerHTML = `
          <div class="caja">
            <h2>⛏️ Minejamin</h2>
            <p>Rompe bloques</p>
            <h1 id="puntos">0</h1>
            <button onclick="minar()">Minar ⛏️</button>
          </div>
        `;
      }

      if (juego === "papa") {
        pantalla.innerHTML = `
          <div class="caja">
            <h2>👨 Papá del Seba</h2>
            <p>¡Atrápalo si puedes!</p>
            <button id="botonPapa" onmouseover="escapar()">Atrapar 😆</button>
            <p id="estado"></p>
          </div>
        `;
      }
    }

    function minar() {
      puntos++;
      document.getElementById("puntos").innerText = puntos;
    }

    function escapar() {
      const boton = document.getElementById("botonPapa");
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);

      boton.style.position = "absolute";
      boton.style.left = x + "px";
      boton.style.top = y + "px";

      document.getElementById("estado").innerText = "😆 Se escapó!";
    }

    /* PARTICULAS */
    const imagenParticula = "https://i.imgur.com/4NZ6uLY.png"; 

    function crearParticula() {
      const p = document.createElement("div");
      p.classList.add("particula");
      p.style.backgroundImage = `url(${imagenParticula})`;
      p.style.left = Math.random() * window.innerWidth + "px";

      const size = Math.random() * 40 + 20;
      p.style.width = size + "px";
      p.style.height = size + "px";

      const duracion = Math.random() * 5 + 5;
      p.style.animationDuration = duracion + "s";

      document.body.appendChild(p);

      setTimeout(() => {
        p.remove();
      }, duracion * 1000);
    }

    setInterval(crearParticula, 300);
  </script>

</body>
</html>
