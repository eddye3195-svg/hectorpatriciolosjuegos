<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Héctor Patricio Los Juegos - Versión Pro</title>
  
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    :root {
      --primary: #00ffcc;
      --dark-arcade: #1a1a2e;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial Black', sans-serif;
      background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc);
      background-size: 600% 600%;
      animation: fondoAnimado 15s ease infinite;
      color: white;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
    }

    @keyframes fondoAnimado {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 { margin-top: 20px; font-size: 45px; text-shadow: 4px 4px 0px #000; }

    .menu { display: flex; justify-content: center; gap: 15px; margin: 20px; }

    .juego-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 3px solid white;
      border-radius: 15px;
      padding: 12px 25px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .juego-btn:hover { background: var(--primary); color: black; transform: scale(1.1); }

    /* CONTENEDOR ARCADE GIGANTE ESTILO ESPN */
    #area-juego { margin: 20px auto; display: flex; justify-content: center; }

    .arcade-frame {
      display: flex;
      background: var(--dark-arcade);
      padding: 25px;
      border-radius: 30px;
      border: 8px solid #222;
      box-shadow: 0 30px 100px rgba(0,0,0,0.8);
    }

    .sidebar {
      width: 90px;
      background: #0f3460;
      border-radius: 20px;
      margin-right: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
      gap: 20px;
    }

    .btn-red { width: 50px; height: 50px; background: #e94560; border-radius: 50%; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.4); }
    .btn-green { width: 45px; height: 45px; background: #4ecca3; border-radius: 10px; }
    .btn-orange { width: 45px; height: 45px; background: #fca311; border-radius: 10px; }
    
    .d-pad {
      width: 60px; height: 60px; background: #333; margin-top: auto;
      clip-path: polygon(35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%);
    }

    /* PANTALLA ARCADE */
    .game-screen {
      background: #000;
      width: 950px; 
      height: 700px; 
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 5px solid #000;
      overflow: hidden;
    }

    /* Lluvia de bocetos de fondo */
    .particula {
      position: fixed; width: 35px; height: 35px;
      background-image: url('https://i.imgur.com/4NZ6uLY.png');
      background-size: cover; pointer-events: none; z-index: -1;
      animation: caer linear infinite;
    }
    @keyframes caer { from { transform: translateY(110vh); } to { transform: translateY(-10vh); } }
  </style>
</head>

<body>

  <h1>🎮 Héctor Patricio Los Juegos</h1>

  <div class="menu">
    <button class="juego-btn" onclick="lanzar('minejamin')">⛏️ Minejamin</button>
    <button class="juego-btn" onclick="lanzar('papa')">👨 Papá del Seba</button>
    <button class="juego-btn" onclick="lanzar('pvz')">🧟 Plants vs Zombies</button>
  </div>

  <div id="area-juego">
    <p>¡Selecciona un juego para activar la consola!</p>
  </div>

  <script>
    function lanzar(id) {
      const area = document.getElementById("area-juego");

      area.innerHTML = `
        <div class="arcade-frame">
          <div class="sidebar">
            <div class="btn-red"></div>
            <div class="btn-green"></div>
            <div class="btn-orange"></div>
            <div class="d-pad"></div>
          </div>
          <div class="game-screen" id="display"></div>
        </div>`;

      const display = document.getElementById("display");

      if (id === "pvz") {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        display.appendChild(player);
        player.style.width = "100%";
        player.style.height = "100%";

        // PEGA AQUÍ LA URL DE 'main.swf' QUE COPIASTE CON "COPY URL"
        const urlCopiada = "https://cdn.flasharch.com/uploads/archived/2021/02/03/e2dda58d6d038c2886d521cfd8fcd134/main.swf"; 
        
        player.load(urlCopiada).catch((e) => {
          console.warn("Fallo el link copiado, usando respaldo de Archive.org...");
          player.load("https://ia804705.us.archive.org/27/items/pvz_web/pvz_web.swf");
        });

      } else if (id === "minejamin") {
        display.innerHTML = `<h2 style="color:var(--primary)">⛏️ MINEJAMIN GIGANTE</h2>`;
      } else if (id === "papa") {
        display.innerHTML = `<button class="juego-btn" style="position:absolute" onmouseover="this.style.left=Math.random()*80+'%';this.style.top=Math.random()*80+'%'">ATRÁPALO!</button>`;
      }
    }

    // Efecto de lluvia decorativa
    setInterval(() => {
      const p = document.createElement("div");
      p.className = "particula";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (Math.random() * 3 + 4) + "s";
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 7000);
    }, 600);
  </script>
</body>
</html>
